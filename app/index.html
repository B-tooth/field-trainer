<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#173f3a">
  <title>Field Trainer</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="shell">
    <header class="app-header">
      <button id="backButton" class="icon-button hidden" aria-label="Go back">←</button>
      <div class="brand">
        <p class="eyebrow">PERSONAL FIELD IDENTIFICATION</p>
        <h1>Field Trainer</h1>
      </div>
      <button id="homeButton" class="secondary hidden">Decks</button>
    </header>

    <section id="homeView">
      <div class="hero card">
        <div>
          <p class="eyebrow">YOUR LIBRARY</p>
          <h2>Choose how you want to learn</h2>
          <p>Read a deck as a reference guide, or test yourself and strengthen difficult cards.</p>
        </div>
      </div>
      <div id="deckList" class="deck-list"></div>
    </section>

    <section id="readView" class="hidden">
      <div class="view-heading">
        <div>
          <p id="readDeckName" class="eyebrow"></p>
          <h2>Read</h2>
        </div>
        <button id="switchToTestButton" class="secondary">Test deck</button>
      </div>

      <div class="progress-row">
        <span id="readProgress"></span>
        <div class="progress-track" aria-hidden="true"><div id="readProgressBar" class="progress-fill"></div></div>
      </div>

      <article class="flashcard read-flashcard">
        <img id="readCardImage" alt="Reference slide">
        <div class="answer-panel">
          <span>Answer</span>
          <h2 id="readAnswerText"></h2>
        </div>
      </article>

      <div class="pager">
        <button id="previousReadButton" class="secondary">← Previous</button>
        <button id="nextReadButton" class="primary">Next →</button>
      </div>
    </section>

    <section id="studyView" class="hidden">
      <div class="view-heading study-heading">
        <div>
          <p id="deckName" class="eyebrow"></p>
          <h2>Test</h2>
        </div>
        <button id="switchToReadButton" class="secondary">Read deck</button>
      </div>

      <div class="progress-row">
        <span id="progressText"></span>
        <div class="progress-track" aria-hidden="true"><div id="testProgressBar" class="progress-fill"></div></div>
      </div>

      <article class="flashcard">
        <img id="cardImage" alt="Flashcard question slide">
        <div id="answerPanel" class="answer-panel hidden">
          <span>Answer</span>
          <h2 id="answerText"></h2>
        </div>
      </article>

      <div id="revealControls" class="controls">
        <button id="revealButton" class="primary wide">Show answer</button>
      </div>
      <div id="ratingControls" class="controls hidden">
        <button id="wrongButton" class="wrong">Wrong</button>
        <button id="rightButton" class="right">Right</button>
      </div>

      <p class="keyboard-help">Space = reveal · ← = wrong · → = right</p>

      <div class="stats card">
        <div><span>Right</span><strong id="rightCount">0</strong></div>
        <div><span>Wrong</span><strong id="wrongCount">0</strong></div>
        <div><span>Accuracy</span><strong id="accuracy">—</strong></div>
      </div>

      <button id="resetButton" class="reset-link">Reset this deck's progress</button>
    </section>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
