<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#16324f">
  <title>Species Flashcards</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <p class="eyebrow">PERSONAL IDENTIFICATION TRAINER</p>
        <h1>Species Flashcards</h1>
      </div>
      <button id="homeButton" class="secondary hidden">Decks</button>
    </header>

    <section id="homeView">
      <div class="intro card">
        <h2>Choose a deck</h2>
        <p>Study the slide, reveal its title, then mark your answer right or wrong.</p>
      </div>
      <div id="deckList" class="deck-list"></div>
    </section>

    <section id="studyView" class="hidden">
      <div class="study-topline">
        <div>
          <p id="deckName" class="eyebrow"></p>
          <strong id="progressText"></strong>
        </div>
        <button id="resetButton" class="text-button">Reset deck progress</button>
      </div>

      <article class="flashcard">
        <img id="cardImage" alt="Flashcard question slide">
        <div id="answerPanel" class="answer-panel hidden">
          <span>Answer</span>
          <h2 id="answerText"></h2>
        </div>
      </article>

      <div id="revealControls" class="controls">
        <button id="revealButton" class="primary wide">Show answer</button>
      </div>
      <div id="ratingControls" class="controls hidden">
        <button id="wrongButton" class="wrong">Wrong</button>
        <button id="rightButton" class="right">Right</button>
      </div>

      <p class="keyboard-help">Keyboard: Space = reveal · ← = wrong · → = right</p>

      <div class="stats card">
        <div><span>Right</span><strong id="rightCount">0</strong></div>
        <div><span>Wrong</span><strong id="wrongCount">0</strong></div>
        <div><span>Accuracy</span><strong id="accuracy">—</strong></div>
      </div>
    </section>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
