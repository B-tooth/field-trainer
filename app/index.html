<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#16324f">
  <title>Species Flashcards</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <p class="eyebrow">PERSONAL IDENTIFICATION TRAINER</p>
        <h1>Species Flashcards</h1>
      </div>
      <button id="homeButton" class="secondary hidden">Decks</button>
    </header>

    <section id="homeView">
      <div class="intro card">
        <h2>Choose a deck</h2>
        <p>Open a deck in Read mode to browse the answers, or Test mode to practise.</p>
      </div>
      <div id="deckList" class="deck-list"></div>
    </section>

    <section id="modeView" class="hidden">
      <div class="intro card mode-intro">
        <p class="eyebrow">CHOOSE A MODE</p>
        <h2 id="modeDeckName"></h2>
        <p id="modeDeckDetails"></p>
      </div>
      <div class="mode-grid">
        <button id="readModeButton" class="mode-button read-mode">
          <span class="mode-icon" aria-hidden="true">📖</span>
          <strong>Read</strong>
          <span>View every slide in order with its answer visible.</span>
        </button>
        <button id="testModeButton" class="mode-button test-mode">
          <span class="mode-icon" aria-hidden="true">✓</span>
          <strong>Test</strong>
          <span>Reveal each answer, then mark yourself right or wrong.</span>
        </button>
      </div>
    </section>

    <section id="readView" class="hidden">
      <div class="view-heading">
        <div>
          <p id="readDeckName" class="eyebrow"></p>
          <h2>Read mode</h2>
          <p id="readProgress" class="view-description"></p>
        </div>
        <button id="switchToTestButton" class="secondary">Test this deck</button>
      </div>
      <div id="readCardList" class="read-card-list"></div>
    </section>

    <section id="studyView" class="hidden">
      <div class="study-topline">
        <div>
          <p id="deckName" class="eyebrow"></p>
          <strong id="progressText"></strong>
        </div>
        <div class="study-actions">
          <button id="switchToReadButton" class="text-button">Read deck</button>
          <button id="resetButton" class="text-button">Reset progress</button>
        </div>
      </div>

      <article class="flashcard">
        <img id="cardImage" alt="Flashcard question slide">
        <div id="answerPanel" class="answer-panel hidden">
          <span>Answer</span>
          <h2 id="answerText"></h2>
        </div>
      </article>

      <div id="revealControls" class="controls">
        <button id="revealButton" class="primary wide">Show answer</button>
      </div>
      <div id="ratingControls" class="controls hidden">
        <button id="wrongButton" class="wrong">Wrong</button>
        <button id="rightButton" class="right">Right</button>
      </div>

      <p class="keyboard-help">Keyboard: Space = reveal · ← = wrong · → = right</p>

      <div class="stats card">
        <div><span>Right</span><strong id="rightCount">0</strong></div>
        <div><span>Wrong</span><strong id="wrongCount">0</strong></div>
        <div><span>Accuracy</span><strong id="accuracy">—</strong></div>
      </div>
    </section>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
